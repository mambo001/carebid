services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      cache_from:
        - carebid-backend:latest
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:ro
      - ./apps/backend/prisma:/app/apps/backend/prisma:ro
      - ./packages:/app/packages:ro
    command: ["npx", "tsx", "watch", "src/main.ts"]
    environment:
      - NODE_ENV=development
      - PORT=8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
      - FIREBASE_PROJECT_ID=carebid-local

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      cache_from:
        - carebid-web:latest
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/index.html:/app/apps/web/index.html:ro
      - ./apps/web/src:/app/apps/web/src:ro
      - ./packages:/app/packages:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - /app/apps/web/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      - VITE_DEV_HOST=0.0.0.0
      - VITE_API_BASE_URL=http://localhost:8080
      - VITE_FIREBASE_API_KEY=AIzaSyDemo123456789012345678901234567890
      - VITE_FIREBASE_AUTH_DOMAIN=localhost
      - VITE_FIREBASE_PROJECT_ID=carebid-local
      - VITE_FIREBASE_APP_ID=1:123456789012:web:abcdef1234567890abcdef
      - VITE_FIREBASE_AUTH_EMULATOR_URL=http://localhost:9099
