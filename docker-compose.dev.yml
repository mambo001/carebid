services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      cache_from:
        - carebid-backend:latest
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:ro
      - ./apps/backend/prisma:/app/apps/backend/prisma:ro
      - ./packages:/app/packages:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    command: ["npx", "tsx", "watch", "src/main.ts"]
    environment:
      - NODE_ENV=development
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-carebid-local}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      cache_from:
        - carebid-web:latest
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/index.html:/app/apps/web/index.html:ro
      - ./apps/web/src:/app/apps/web/src:ro
      - ./packages:/app/packages:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - /app/apps/web/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      - VITE_DEV_HOST=0.0.0.0
