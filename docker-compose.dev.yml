services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      cache_from:
        - carebid-backend:latest
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:ro
      - ./apps/backend/prisma:/app/apps/backend/prisma:ro
      - ./packages:/app/packages:ro
    command: ["npx", "tsx", "watch", "src/main.ts"]
    environment:
      - NODE_ENV=development
      - PORT=8080

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      cache_from:
        - carebid-web:latest
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./packages:/app/packages:ro
    command: ["npm", "run", "dev"]
    environment:
      - VITE_DEV_HOST=0.0.0.0
