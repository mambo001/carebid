name: Deploy Web

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: carebid-backend
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

jobs:
  deploy:
    name: Build and deploy web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Resolve web build configuration
        run: |
          test -n "$GCP_PROJECT_ID" || { echo "Missing repository variable GCP_PROJECT_ID" >&2; exit 1; }
          test -n "$GCP_REGION" || { echo "Missing repository variable GCP_REGION" >&2; exit 1; }
          test -n "$VITE_FIREBASE_API_KEY" || { echo "Missing repository secret VITE_FIREBASE_API_KEY" >&2; exit 1; }
          test -n "$VITE_FIREBASE_APP_ID" || { echo "Missing repository secret VITE_FIREBASE_APP_ID" >&2; exit 1; }
          if [ -z "$VITE_API_BASE_URL" ]; then
            VITE_API_BASE_URL="$(gcloud run services describe "$SERVICE_NAME" --project="$GCP_PROJECT_ID" --region="$GCP_REGION" --format='value(status.url)')"
          fi
          if [ -z "$VITE_FIREBASE_AUTH_DOMAIN" ]; then
            VITE_FIREBASE_AUTH_DOMAIN="${GCP_PROJECT_ID}.firebaseapp.com"
          fi
          {
            echo "VITE_API_BASE_URL=$VITE_API_BASE_URL"
            echo "VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN"
          } >> "$GITHUB_ENV"

      - name: Build web
        run: bash scripts/build-web-production.sh

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project "$GCP_PROJECT_ID"
