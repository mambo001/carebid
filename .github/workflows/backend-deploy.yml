name: Deploy Backend

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: carebid-backend
  REPOSITORY: carebid-backend
  IMAGE_NAME: carebid-backend
  ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate deployment configuration
        run: |
          test -n "$GCP_PROJECT_ID" || { echo "Missing repository variable GCP_PROJECT_ID" >&2; exit 1; }
          test -n "$GCP_REGION" || { echo "Missing repository variable GCP_REGION" >&2; exit 1; }
          test -n "$ALLOWED_ORIGINS" || { echo "Missing repository variable ALLOWED_ORIGINS" >&2; exit 1; }

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build backend image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" -f apps/backend/Dockerfile .
          docker tag "$IMAGE" "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:latest"

      - name: Push backend image
        run: |
          docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:latest"

      - name: Deploy backend to Cloud Run
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE" \
            --service-account="carebid-backend@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,FIREBASE_PROJECT_ID=${GCP_PROJECT_ID},ALLOWED_ORIGINS=${ALLOWED_ORIGINS}" \
            --set-secrets="DATABASE_URL=carebid-database-url:latest,REDIS_URL=carebid-redis-url:latest"
