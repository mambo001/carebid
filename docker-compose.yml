services:
  neon-postgres:
    image: postgres:16-alpine
    container_name: carebid-neon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: neon
      POSTGRES_PASSWORD: neon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: carebid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  firebase-emulator:
    image: node:20-alpine
    container_name: carebid-firebase-emulator
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -c "npm install -g firebase-tools@13.35.1 &&
      firebase emulators:start --project carebid-local --only auth,ui"
    ports:
      - "4000:4000"
      - "9099:9099"
    volumes:
      - ./:/workspace
      - firebase-tools-cache:/root/.cache
    depends_on:
      neon-postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: carebid-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_NAME: CareBid
      DATABASE_URL: postgresql://neon:neon@neon-postgres:5432/neondb
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_URL: redis://redis:6379
      FIREBASE_PROJECT_ID: carebid-local
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
    ports:
      - "8080:8080"
    volumes:
      - ./apps/backend:/workspace/apps/backend
    depends_on:
      neon-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      firebase-emulator:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: carebid-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: http://backend:8080
      VITE_FIREBASE_API_KEY: fake-api-key
      VITE_FIREBASE_AUTH_DOMAIN: carebid-local.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: carebid-local
      VITE_FIREBASE_APP_ID: 1:1234567890:web:carebidlocal
      VITE_FIREBASE_AUTH_EMULATOR_URL: http://firebase-emulator:9099
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/workspace/apps/web
    depends_on:
      backend:
        condition: service_started
      firebase-emulator:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  firebase-tools-cache: