services:
  neon-postgres:
    image: postgres:16-alpine
    container_name: carebid-neon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: neon
      POSTGRES_PASSWORD: neon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: carebid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  firebase-emulator:
    image: node:20-alpine
    container_name: carebid-firebase-emulator
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -c "npm install -g firebase-tools@13.35.1 &&
      firebase emulators:start --project carebid-local --only auth,ui"
    ports:
      - "4000:4000"
      - "9099:9099"
    volumes:
      - ./:/workspace
      - firebase-tools-cache:/root/.cache

volumes:
  postgres-data:
  redis-data:
  firebase-tools-cache:
