services:
  firebase-emulator:
    build:
      context: .
      dockerfile: docker/firebase-emulator.Dockerfile
    container_name: carebid-firebase-emulator
    restart: unless-stopped
    working_dir: /workspace
    ports:
      - "4000:4000"
      - "9099:9099"
    volumes:
      - ./:/workspace
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  neon-postgres:
    image: postgres:16-alpine
    container_name: carebid-neon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: neon
      POSTGRES_PASSWORD: neon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      firebase-emulator:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: carebid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: carebid-backend
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "npx prisma db push --schema prisma/schema.prisma --skip-generate && exec npm start",
      ]
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_NAME: CareBid
      DATABASE_URL: postgresql://neon:neon@neon-postgres:5432/neondb
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_URL: redis://redis:6379
      FIREBASE_PROJECT_ID: carebid-local
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      neon-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_FIREBASE_API_KEY: fake-api-key
        VITE_FIREBASE_AUTH_DOMAIN: carebid-local.firebaseapp.com
        VITE_FIREBASE_PROJECT_ID: carebid-local
        VITE_FIREBASE_APP_ID: 1:1234567890:web:carebidlocal
        VITE_FIREBASE_AUTH_EMULATOR_URL: http://localhost:9099
    container_name: carebid-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
